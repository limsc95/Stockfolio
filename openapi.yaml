        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WatchListItemResponse'

  /api/v1/watchlist/{stockCode}:
    post:
      tags: [WatchList]
      summary: 관심종목 추가
      security:
        - BearerAuth: []
      parameters:
        - name: stockCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: 추가 성공
        '409':
          description: 이미 등록된 종목
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    delete:
      tags: [WatchList]
