openapi: 3.0.3

info:
  title: StockFolio API
  description: |
    주식 포트폴리오 관리 서비스 REST API

    ## 인증
    로그인 후 발급되는 JWT Access Token을 `Authorization: Bearer {token}` 헤더에 포함하여 요청합니다.
    Access Token 만료 시 Refresh Token으로 재발급합니다.

    ## 공통 응답 형식
    모든 응답은 아래 형식을 따릅니다.
    ```json
    {
      "success": true,
      "data": { ... },
      "error": null
    }
    ```

    ## 에러 응답 형식
    ```json
    {
      "success": false,
      "data": null,
      "error": {
        "code": "STOCK_NOT_FOUND",
        "message": "종목을 찾을 수 없습니다.",
        "timestamp": "2026-05-22T10:00:00Z"
      }
    }
    ```
  version: 1.0.0
  contact:
    name: StockFolio Dev

servers:
  - url: https://api.stockfolio.example.com
    description: Production
  - url: http://localhost:8080
    description: Local Development

tags:
  - name: Auth
    description: 인증 (회원가입, 로그인, 토큰 재발급)
  - name: Users
    description: 회원 정보 관리
  - name: Stocks
    description: 종목 검색 및 시세 조회
  - name: Portfolios
    description: 포트폴리오 관리
  - name: Holdings
    description: 포트폴리오 보유 종목 관리
  - name: Trades
    description: 매수 / 매도 거래 내역
  - name: WatchList
    description: 관심종목
  - name: Alerts
    description: 가격 알림 설정
  - name: Admin
    description: 관리자 전용 API

# ============================================================
# Security Schemes
# ============================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ============================================================
  # Reusable Schemas
  # ============================================================
  schemas:

    # --- 공통 ---
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          nullable: true
        error:
          $ref: '#/components/schemas/ApiError'
          nullable: true

    ApiError:
      type: object
      properties:
        code:
          type: string
          example: STOCK_NOT_FOUND
        message:
          type: string
          example: 종목을 찾을 수 없습니다.
        timestamp:
          type: string
          format: date-time

    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          example: 150
        totalPages:
          type: integer
          example: 8

    # --- Auth ---
    SignUpRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 20
          example: password123!
        name:
          type: string
          maxLength: 50
          example: 홍길동

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access Token 만료 시간 (초)
          example: 3600

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    # --- User ---
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 50

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    # --- Stock ---
    StockResponse:
      type: object
      properties:
        code:
          type: string
          example: "005930"
        name:
          type: string
          example: 삼성전자
        market:
          type: string
          enum: [KOSPI, KOSDAQ, NYSE, NASDAQ]
        sector:
          type: string
          example: 반도체

    StockPriceResponse:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        currentPrice:
          type: number
          format: double
          example: 78500.0
        changeAmount:
          type: number
          format: double
          description: 전일 대비 변동액
          example: 500.0
        changeRate:
          type: number
          format: double
          description: 전일 대비 변동률 (%)
          example: 0.64
        volume:
          type: integer
          format: int64
          description: 거래량
        cachedAt:
          type: string
          format: date-time
          description: Redis 캐시 저장 시각

    # --- Portfolio ---
    CreatePortfolioRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
          example: 주식 포트폴리오 1
        description:
          type: string
          example: 장기 투자용

    UpdatePortfolioRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string

    PortfolioResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        totalInvestment:
          type: number
          format: double
          description: 총 투자금액 (평균가 × 수량 합계)
        totalCurrentValue:
          type: number
          format: double
          description: 현재 평가금액 (현재가 × 수량 합계)
        totalProfitLoss:
          type: number
          format: double
          description: 평가 손익
        totalProfitLossRate:
          type: number
          format: double
          description: 수익률 (%)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PortfolioSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        totalProfitLossRate:
          type: number
          format: double
        holdingCount:
          type: integer

    # --- Holdings ---
    AddHoldingRequest:
      type: object
      required: [stockCode, quantity, price]
      properties:
        stockCode:
          type: string
          example: "005930"
        quantity:
          type: integer
          minimum: 1
          example: 10
        price:
          type: number
          format: double
          description: 매수 단가
          example: 78000.0

    HoldingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        stockCode:
          type: string
        stockName:
          type: string
        quantity:
          type: integer
        averagePrice:
          type: number
          format: double
        currentPrice:
          type: number
          format: double
        profitLoss:
          type: number
          format: double
        profitLossRate:
          type: number
          format: double

    # --- Trade ---
    TradeRequest:
      type: object
      required: [tradeType, quantity, price]
      properties:
        tradeType:
          type: string
          enum: [BUY, SELL]
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          format: double

    TradeHistoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tradeType:
          type: string
          enum: [BUY, SELL]
        stockCode:
          type: string
        stockName:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: double
        tradedAt:
          type: string
          format: date-time

    # --- WatchList ---
    WatchListItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        stockCode:
          type: string
        stockName:
          type: string
        market:
          type: string
        currentPrice:
          type: number
          format: double
        changeRate:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time

    # --- Alerts ---
    CreateAlertRequest:
      type: object
      required: [stockCode, alertType, targetPrice]
      properties:
        stockCode:
          type: string
          example: "005930"
        alertType:
          type: string
          enum: [TARGET_PRICE, STOP_LOSS]
        targetPrice:
          type: number
          format: double
          example: 85000.0

    AlertResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        stockCode:
          type: string
        stockName:
          type: string
        alertType:
          type: string
          enum: [TARGET_PRICE, STOP_LOSS]
        targetPrice:
          type: number
          format: double
        isTriggered:
          type: boolean
        createdAt:
          type: string
          format: date-time
        triggeredAt:
          type: string
          format: date-time
          nullable: true

    AlertHistoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
        channel:
          type: string
          enum: [EMAIL, SLACK]
        status:
          type: string
          enum: [SUCCESS, FAILED]
        sentAt:
          type: string
          format: date-time

    # --- Admin ---
    AdminUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DashboardStatsResponse:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
          description: 최근 7일 로그인 유저
        totalPortfolios:
          type: integer
        totalAlertsSentToday:
          type: integer
        errorRatePercent:
          type: number
          format: double
          description: 최근 1시간 에러율 (%)

  # ============================================================
  # Reusable Responses
  # ============================================================
  responses:
    Unauthorized:
      description: 인증 실패 (토큰 없음 또는 만료)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    BadRequest:
      description: 잘못된 요청 (유효성 검사 실패)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

# ============================================================
# Paths
# ============================================================
paths:

  # ---- Auth ----
  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공, JWT 토큰 발급
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Access Token 재발급
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃 (Refresh Token 무효화)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---- Users ----
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: 내 정보 조회
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Users]
      summary: 내 정보 수정
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'

    delete:
      tags: [Users]
      summary: 회원 탈퇴 (Soft Delete)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 탈퇴 성공

  /api/v1/users/me/password:
    patch:
      tags: [Users]
      summary: 비밀번호 변경
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: 변경 성공
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---- Stocks ----
  /api/v1/stocks:
    get:
      tags: [Stocks]
      summary: 종목 검색
      parameters:
        - name: query
          in: query
          required: true
          description: 종목명 또는 종목코드 (2자 이상)
          schema:
            type: string
            example: 삼성
        - name: market
          in: query
          required: false
          schema:
            type: string
            enum: [KOSPI, KOSDAQ, NYSE, NASDAQ]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 검색 결과
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items:
                              $ref: '#/components/schemas/StockResponse'
                          meta:
                            $ref: '#/components/schemas/PageMeta'

  /api/v1/stocks/{code}/price:
    get:
      tags: [Stocks]
      summary: 종목 현재가 조회 (Redis 캐시, TTL 30초)
      security:
        - BearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            example: "005930"
      responses:
        '200':
          description: 현재가 정보
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StockPriceResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Portfolios ----
  /api/v1/portfolios:
    get:
      tags: [Portfolios]
      summary: 내 포트폴리오 목록 조회
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PortfolioSummaryResponse'

    post:
      tags: [Portfolios]
      summary: 포트폴리오 생성
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePortfolioRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PortfolioResponse'

  /api/v1/portfolios/{portfolioId}:
    get:
      tags: [Portfolios]
      summary: 포트폴리오 상세 조회 (현재가 기반 수익률 포함)
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PortfolioResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Portfolios]
      summary: 포트폴리오 수정
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePortfolioRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PortfolioResponse'

    delete:
      tags: [Portfolios]
      summary: 포트폴리오 삭제
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 삭제 성공

  # ---- Holdings ----
  /api/v1/portfolios/{portfolioId}/holdings:
    get:
      tags: [Holdings]
      summary: 보유 종목 목록 조회
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HoldingResponse'

    post:
      tags: [Holdings]
      summary: 종목 추가 (매수)
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddHoldingRequest'
      responses:
        '201':
          description: 추가 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HoldingResponse'

  /api/v1/portfolios/{portfolioId}/holdings/{holdingId}:
    delete:
      tags: [Holdings]
      summary: 보유 종목 삭제 (전체 매도 처리)
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: holdingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 삭제 성공

  # ---- Trades ----
  /api/v1/portfolios/{portfolioId}/holdings/{holdingId}/trades:
    get:
      tags: [Trades]
      summary: 거래 내역 조회
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: holdingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items:
                              $ref: '#/components/schemas/TradeHistoryResponse'
                          meta:
                            $ref: '#/components/schemas/PageMeta'

    post:
      tags: [Trades]
      summary: 거래 기록 추가 (매수/매도)
      security:
        - BearerAuth: []
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: holdingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeRequest'
      responses:
        '201':
          description: 기록 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TradeHistoryResponse'

  # ---- WatchList ----
  /api/v1/watchlist:
