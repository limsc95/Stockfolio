        '404':
          $ref: '#/components/responses/NotFound'

  # ---- Alerts ----
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: 내 알림 설정 목록 조회
      security:
        - BearerAuth: []
      parameters:
        - name: isTriggered
          in: query
          required: false
          schema:
            type: boolean
          description: true = 발동된 알림만, false = 미발동만, 없으면 전체
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AlertResponse'

    post:
      tags: [Alerts]
      summary: 가격 알림 설정
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: 설정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AlertResponse'

