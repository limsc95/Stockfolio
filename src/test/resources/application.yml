# ──────────────────────────────────────────────────────────
# 테스트 전용 공통 설정 (src/main/resources/application.yml 오버라이드)
# ──────────────────────────────────────────────────────────

spring:
  main:
    allow-bean-definition-overriding: true   # 빈 정의 충돌 방지 (안전망)

  jpa:
    hibernate:
      ddl-auto: create-drop   # @DataJpaTest 에서 H2 스키마 자동 생성/삭제
    show-sql: false

  # ── 테스트에서 불필요한 인프라 Auto-Configuration 비활성화 ──
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.amqp.RabbitHealthContributorAutoConfiguration

# ── JWT — 테스트용 최소 설정 ────────────────────────────────
# (실제 시크릿과 무관, 길이만 256 bits(32 bytes) 이상이면 됨)
jwt:
  secret: test-secret-key-stockfolio-must-be-at-least-32-bytes
  access-token-expiry: 3600
  refresh-token-expiry: 604800
