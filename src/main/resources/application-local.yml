  publicdata:
    api-key: TLeRDrG6y1g43FNznPpFf5pFGhWPsgfO/5aPpkadZAh3bvktTXLFiT9xBdPENcEsZlRapX5owmPMG7e/28Mz2g==   # ← data.go.kr Decoding 키 입력

management:
  health:
    mail:
      enabled: false   # 로컬엔 실제 메일 계정 없으므로 health check 비활성화

