# ──────────────────────────────────────────────────────────
# 로컬 개발 환경 (docker-compose 기준)
# ──────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/stockfolio?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # 테이블 구조 변경만 반영, 기존 데이터 유지
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:   # 로컬은 비밀번호 없음

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  mail:
    username: dev-mail@example.com   # 로컬 테스트용 (실제 발송 안 해도 됨)
    password: ''

# ── KIS Developers API (한국투자증권 모의계좌) ─────────────
# https://apiportal.koreainvestment.com 에서 발급
# 미설정 시 현재가 조회는 0 반환 (기능 동작에는 지장 없음)
kis:
  app-key: ''
  app-secret: ''
  access-token: ''

management:
  health:
    mail:
      enabled: false   # 로컬엔 실제 메일 계정 없으므로 health check 비활성화

jwt:
  secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256

# 로컬에서는 Swagger 활성화
springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    com.stockfolio: DEBUG
    org.springframework.security: DEBUG
