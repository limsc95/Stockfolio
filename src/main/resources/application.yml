spring:
  application:
    name: stockfolio

  profiles:
    active: local   # 기본 프로파일 (배포 시 prod로 변경)

  # ── 스케줄러 ─────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 3   # 스케줄러 스레드 풀 (알림 체크 등)

  # ── JPA 공통 ─────────────────────────────────────────────
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100   # N+1 방지용 batch size

  # ── Thymeleaf ────────────────────────────────────────────
  thymeleaf:
    cache: false   # 개발 편의 (prod 프로파일에서 true로 override)

  # ── Mail (알림용) ─────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# ── Actuator / 모니터링 ────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# ── OpenAPI / Swagger ─────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# ── JWT 설정 ──────────────────────────────────────────────
jwt:
  access-token-expiry: 3600      # 1시간 (초)
  refresh-token-expiry: 604800   # 7일 (초)
  # secret은 환경별 yml에서 설정

# ── 로깅 ─────────────────────────────────────────────────
logging:
  level:
    com.stockfolio: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE   # 바인딩 파라미터 출력
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
