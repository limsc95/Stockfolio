<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | StockFolio Admin'">StockFolio Admin</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(160deg, #1a1f36 0%, #2d3561 100%);
            width: 240px;
            position: fixed;
            top: 0; left: 0;
        }
        .sidebar .brand {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 1.5rem 1.25rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: .6rem 1.25rem;
            border-radius: .4rem;
            margin: .15rem .75rem;
            font-size: .9rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .sidebar .nav-link i { margin-right: .5rem; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e3e6f0;
            padding: .75rem 2rem;
            margin-left: 240px;
            position: sticky; top: 0; z-index: 100;
        }
        .stat-card { border: none; border-radius: .75rem; }
        .stat-card .icon-box {
            width: 48px; height: 48px;
            border-radius: .5rem;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .badge-success-soft { background: #d1fae5; color: #065f46; }
        .badge-danger-soft  { background: #fee2e2; color: #991b1b; }
    </style>
</head>

<nav th:fragment="sidebar(activePage)" class="sidebar d-flex flex-column py-3">
    <div class="brand">
        <i class="bi bi-graph-up-arrow me-2"></i>StockFolio
        <div class="text-white-50 fw-normal" style="font-size:.7rem">Admin Dashboard</div>
    </div>
    <ul class="nav flex-column mt-3">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active'" href="/admin">
                <i class="bi bi-speedometer2"></i> 대시보드
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'users'} ? 'active'" href="/admin/users">
                <i class="bi bi-people"></i> 회원 관리
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${activePage == 'alerts'} ? 'active'" href="/admin/alerts">
                <i class="bi bi-bell"></i> 알림 이력
            </a>
        </li>
        <li class="nav-item mt-3" style="border-top:1px solid rgba(255,255,255,.1); padding-top:.75rem">
            <a class="nav-link" href="/swagger-ui.html" target="_blank">
                <i class="bi bi-code-slash"></i> API 문서
            </a>
        </li>
    </ul>
</nav>

<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</html>
