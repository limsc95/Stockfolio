<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ── 공통 head ─────────────────────────────────────── -->
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | StockFolio'">StockFolio</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f0f2f5; }
        .navbar-brand { font-weight: 700; letter-spacing: -.5px; }
        .card { border: none; border-radius: .75rem; }
        .card-header { background: #fff; border-bottom: 1px solid #e3e6f0; border-radius: .75rem .75rem 0 0 !important; }
        .badge-profit  { background: #d1fae5; color: #065f46; }
        .badge-loss    { background: #fee2e2; color: #991b1b; }
        .badge-neutral { background: #e5e7eb; color: #374151; }
        .table th { font-size: .82rem; text-transform: uppercase; color: #6b7280; font-weight: 600; }
        .profit-text { color: #16a34a; font-weight: 600; }
        .loss-text   { color: #dc2626; font-weight: 600; }
    </style>
</th:block>

<!-- ── 상단 내비게이션 바 ──────────────────────────────── -->
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(90deg,#1a1f36,#2d3561);">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/home">
            <i class="bi bi-graph-up-arrow me-1"></i>StockFolio
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'home'} ? 'active'"
                       href="/home"><i class="bi bi-briefcase me-1"></i>포트폴리오</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'stocks'} ? 'active'"
                       href="/stocks"><i class="bi bi-search me-1"></i>종목 검색</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'watchlist'} ? 'active'"
                       href="/watchlist"><i class="bi bi-star me-1"></i>관심종목</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'alerts'} ? 'active'"
                       href="/alerts"><i class="bi bi-bell me-1"></i>가격 알림</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning" href="/admin">
                        <i class="bi bi-shield-lock me-1"></i>관리자
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${me?.name ?: '내 계정'}">내 계정</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><h6 class="dropdown-header" th:text="${me?.email}">email</h6></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form action="/logout" method="post" class="px-3">
                                <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                                    <i class="bi bi-box-arrow-right me-1"></i>로그아웃
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ── 공통 scripts ───────────────────────────────────── -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
