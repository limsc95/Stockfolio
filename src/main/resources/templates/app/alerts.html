<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('가격 알림')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar('alerts')}"></div>

<div class="container py-4">

    <!-- 플래시 메시지 -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 헤더 -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">가격 알림</h4>
            <p class="text-muted small mb-0">목표가·손절가 도달 시 이메일로 알림을 받습니다</p>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createAlertModal">
            <i class="bi bi-bell-fill me-1"></i>알림 추가
        </button>
    </div>

    <!-- 필터 탭 -->
    <div class="d-flex gap-2 mb-3">
        <a href="/alerts" class="btn btn-sm"
           th:classappend="${triggered == null} ? 'btn-dark' : 'btn-outline-secondary'">전체</a>
        <a href="/alerts?triggered=false" class="btn btn-sm"
           th:classappend="${triggered != null && !triggered} ? 'btn-primary' : 'btn-outline-primary'">
            <i class="bi bi-bell me-1"></i>대기 중
        </a>
        <a href="/alerts?triggered=true" class="btn btn-sm"
           th:classappend="${triggered != null && triggered} ? 'btn-success' : 'btn-outline-success'">
            <i class="bi bi-check2-circle me-1"></i>발동 완료
        </a>
    </div>

    <!-- 알림 목록 -->
    <div class="card shadow-sm" th:if="${!alerts.empty}">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">종목</th>
                        <th>유형</th>
                        <th class="text-end">기준가</th>
                        <th class="text-center">상태</th>
                        <th class="text-center">설정일</th>
                        <th class="text-center">발동일</th>
                        <th class="text-center pe-3">삭제</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${alerts}">
                        <td class="ps-3">
                            <div class="fw-semibold" th:text="${a.stockName}">종목명</div>
                            <div class="text-muted small" th:text="${a.stockCode}">코드</div>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${a.alertType == 'TARGET_PRICE'} ? 'bg-success' : 'bg-danger'"
                                  th:text="${a.alertType == 'TARGET_PRICE'} ? '목표가' : '손절가'">-</span>
                        </td>
                        <td class="text-end fw-semibold"
                            th:text="${#numbers.formatInteger(a.targetPrice, 3, 'COMMA') + '원'}">-</td>
                        <td class="text-center">
                            <span th:if="${a.triggered}" class="badge" style="background:#d1fae5;color:#065f46">
                                <i class="bi bi-check2"></i> 발동
                            </span>
                            <span th:unless="${a.triggered}" class="badge bg-light text-dark border">
                                <i class="bi bi-clock"></i> 대기
                            </span>
                        </td>
                        <td class="text-center text-muted small"
                            th:text="${#temporals.format(a.createdAt,'yyyy-MM-dd')}">-</td>
                        <td class="text-center text-muted small">
                            <span th:if="${a.triggeredAt != null}"
                                  th:text="${#temporals.format(a.triggeredAt,'yyyy-MM-dd HH:mm')}">-</span>
                            <span th:unless="${a.triggeredAt != null}" class="text-muted">—</span>
                        </td>
                        <td class="text-center pe-3">
                            <form th:action="@{/alerts/{id}/delete(id=${a.id})}" method="post"
                                  th:unless="${a.triggered}">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('알림을 삭제하시겠습니까?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                            <span th:if="${a.triggered}" class="text-muted small">—</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 알림 없을 때 -->
    <div th:if="${alerts.empty}" class="card shadow-sm text-center py-5">
        <div class="card-body">
            <i class="bi bi-bell display-4 text-muted"></i>
            <h6 class="mt-3 text-muted">설정된 알림이 없습니다</h6>
            <p class="text-muted small">목표가 또는 손절가를 설정하면 이메일로 알림을 받을 수 있습니다.</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createAlertModal">
                <i class="bi bi-bell-fill me-1"></i>알림 설정하기
            </button>
        </div>
    </div>

</div>

<!-- 알림 생성 모달 -->
<div class="modal fade" id="createAlertModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-semibold">가격 알림 설정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/alerts" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-medium">종목 코드 <span class="text-danger">*</span></label>
                        <input type="text" name="stockCode" id="alertStockCode" class="form-control"
                               placeholder="예) 005930" required>
                        <div class="form-text">
                            <a href="/stocks" target="_blank">
                                <i class="bi bi-search me-1"></i>종목 검색에서 코드를 확인하세요
                            </a>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">알림 유형 <span class="text-danger">*</span></label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="alertType"
                                       id="typeTarget" value="TARGET_PRICE" checked>
                                <label class="form-check-label" for="typeTarget">
                                    <span class="badge bg-success me-1">목표가</span>
                                    현재가 ≥ 기준가
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="alertType"
                                       id="typeStop" value="STOP_LOSS">
                                <label class="form-check-label" for="typeStop">
                                    <span class="badge bg-danger me-1">손절가</span>
                                    현재가 ≤ 기준가
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">기준가 (원) <span class="text-danger">*</span></label>
                        <input type="number" name="targetPrice" class="form-control"
                               placeholder="0" min="1" step="0.01" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-bell-fill me-1"></i>알림 설정
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/navbar :: scripts}"></div>
<script>
// URL 파라미터로 stockCode 자동 입력
const params = new URLSearchParams(window.location.search);
const sc = params.get('stockCode');
if (sc) {
    const el = document.getElementById('alertStockCode');
    if (el) el.value = sc;
}
</script>
</body>
</html>
