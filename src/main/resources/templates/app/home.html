<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/navbar :: head('포트폴리오')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar('home')}"></div>

<div class="container py-4">

    <!-- 플래시 메시지 -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- 헤더 -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">내 포트폴리오</h4>
            <span class="text-muted small" th:text="'총 ' + ${portfolios.size()} + '개'"></span>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg me-1"></i>새 포트폴리오
        </button>
    </div>

    <!-- 포트폴리오 카드 목록 -->
    <div class="row g-3" th:if="${!portfolios.empty}">
        <div class="col-md-6 col-xl-4" th:each="p : ${portfolios}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-semibold mb-0" th:text="${p.name}">포트폴리오명</h6>
                        <span class="badge"
                              th:classappend="${p.totalProfitLossRate > 0} ? 'badge-profit' : (${p.totalProfitLossRate < 0} ? 'badge-loss' : 'badge-neutral')"
                              th:text="${p.totalProfitLossRate > 0 ? '+' : ''} + ${p.totalProfitLossRate} + '%'">0%</span>
                    </div>
                    <p class="text-muted small mb-3">
                        <i class="bi bi-layers me-1"></i>
                        <span th:text="${p.holdingCount} + '개 종목'"></span>
                    </p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/portfolios/{id}(id=${p.id})}" class="btn btn-outline-primary btn-sm flex-fill">
                            <i class="bi bi-eye me-1"></i>상세 보기
                        </a>
                        <form th:action="@{/home/portfolio/{id}/delete(id=${p.id})}" method="post"
                              onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-top-0">
                    <span class="text-muted" style="font-size:.75rem">
                        <i class="bi bi-clock me-1"></i>
                        <span th:text="${#temporals.format(p.updatedAt,'yyyy-MM-dd HH:mm')}"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- 포트폴리오 없을 때 -->
    <div th:if="${portfolios.empty}" class="card shadow-sm text-center py-5">
        <div class="card-body">
            <i class="bi bi-briefcase display-4 text-muted"></i>
            <h6 class="mt-3 text-muted">아직 포트폴리오가 없습니다</h6>
            <p class="text-muted small">첫 번째 포트폴리오를 만들어 보세요!</p>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
                <i class="bi bi-plus-lg me-1"></i>포트폴리오 만들기
            </button>
        </div>
    </div>

</div>

<!-- 포트폴리오 생성 모달 -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-semibold">새 포트폴리오</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/home/portfolio" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-medium">포트폴리오 이름 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control"
                               placeholder="예) 성장주 포트폴리오" required maxlength="100">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">설명</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="포트폴리오 설명 (선택)"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-lg me-1"></i>생성하기
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/navbar :: scripts}"></div>
</body>
</html>
