<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('알림 이력')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('alerts')}"></div>

<div class="topbar d-flex align-items-center justify-content-between">
    <h5 class="mb-0 fw-semibold text-dark">알림 발송 이력</h5>
    <span class="text-muted small"
          th:text="'총 ' + ${histories.meta.totalElements} + '건'"></span>
</div>

<main class="main-content">

    <!-- 상태 필터 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-2 d-flex gap-2">
            <a href="/admin/alerts"
               class="btn btn-sm"
               th:classappend="${selectedStatus == null} ? 'btn-dark' : 'btn-outline-secondary'">
                전체
            </a>
            <a href="/admin/alerts?status=SUCCESS"
               class="btn btn-sm"
               th:classappend="${selectedStatus?.name() == 'SUCCESS'} ? 'btn-success' : 'btn-outline-success'">
                <i class="bi bi-check-circle"></i> 성공
            </a>
            <a href="/admin/alerts?status=FAILED"
               class="btn btn-sm"
               th:classappend="${selectedStatus?.name() == 'FAILED'} ? 'btn-danger' : 'btn-outline-danger'">
                <i class="bi bi-x-circle"></i> 실패
            </a>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">종목</th>
                        <th>알림 유형</th>
                        <th>수신 이메일</th>
                        <th>채널</th>
                        <th>결과</th>
                        <th>발송 시각</th>
                        <th>오류</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="h : ${histories.content}">
                        <td class="ps-3">
                            <span class="fw-semibold" th:text="${h.stockName}"></span>
                            <span class="text-muted small ms-1" th:text="'(' + ${h.stockCode} + ')'"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${h.alertType == 'TARGET_PRICE'} ? 'bg-success' : 'bg-danger'"
                                  th:text="${h.alertType == 'TARGET_PRICE'} ? '목표가' : '손절가'"></span>
                        </td>
                        <td class="small" th:text="${h.message}">—</td>
                        <td>
                            <span class="badge bg-info text-dark" th:text="${h.channel}"></span>
                        </td>
                        <td>
                            <span class="badge badge-success-soft" th:if="${h.status == 'SUCCESS'}">
                                <i class="bi bi-check"></i> 성공
                            </span>
                            <span class="badge badge-danger-soft" th:unless="${h.status == 'SUCCESS'}">
                                <i class="bi bi-x"></i> 실패
                            </span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(h.sentAt,'yyyy-MM-dd HH:mm:ss')}"></td>
                        <td>
                            <span th:if="${h.errorMessage != null}"
                                  class="text-danger small"
                                  th:title="${h.errorMessage}"
                                  style="cursor:help">
                                <i class="bi bi-exclamation-triangle"></i> 오류 있음
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${histories.content.empty}">
                        <td colspan="7" class="text-center text-muted py-4">
                            발송 이력이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
            <span class="text-muted small"
                  th:text="${histories.meta.page + 1} + ' / ' + ${histories.meta.totalPages} + ' 페이지'"></span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${histories.meta.page == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/alerts(page=${histories.meta.page - 1}, status=${selectedStatus})}">이전</a>
                    </li>
                    <li class="page-item"
                        th:classappend="${histories.meta.page + 1 >= histories.meta.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/alerts(page=${histories.meta.page + 1}, status=${selectedStatus})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
