<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('회원 관리')}"></head>
<body>

<div th:replace="~{fragments/layout :: sidebar('users')}"></div>

<div class="topbar d-flex align-items-center justify-content-between">
    <h5 class="mb-0 fw-semibold text-dark">회원 관리</h5>
    <span class="text-muted small"
          th:text="'총 ' + ${users.meta.totalElements} + '명'"></span>
</div>

<main class="main-content">

    <!-- 검색 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body py-2">
            <form method="get" action="/admin/users" class="d-flex gap-2">
                <input type="text" name="query" class="form-control form-control-sm"
                       placeholder="이름 또는 이메일로 검색"
                       th:value="${query}" style="max-width:320px">
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search"></i> 검색
                </button>
                <a href="/admin/users" class="btn btn-outline-secondary btn-sm">초기화</a>
            </form>
        </div>
    </div>

    <!-- 테이블 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>이메일</th>
                        <th>이름</th>
                        <th>권한</th>
                        <th>상태</th>
                        <th>가입일</th>
                        <th class="text-center">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users.content}">
                        <td class="ps-3 text-muted small" th:text="${user.id}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.name}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${user.role == 'ADMIN'} ? 'bg-danger' : 'bg-secondary'"
                                  th:text="${user.role}"></span>
                        </td>
                        <td>
                            <span th:if="${user.active}" class="badge badge-success-soft">활성</span>
                            <span th:unless="${user.active}" class="badge badge-danger-soft">비활성</span>
                        </td>
                        <td class="small text-muted"
                            th:text="${#temporals.format(user.createdAt,'yyyy-MM-dd')}"></td>
                        <td class="text-center">
                            <button th:if="${user.active && user.role != 'ADMIN'}"
                                    class="btn btn-outline-danger btn-sm"
                                    th:data-user-id="${user.id}"
                                    th:data-user-name="${user.name}"
                                    onclick="confirmDeactivate(this)">
                                <i class="bi bi-person-x"></i> 비활성화
                            </button>
                            <span th:unless="${user.active}" class="text-muted small">—</span>
                        </td>
                    </tr>
                    <tr th:if="${users.content.empty}">
                        <td colspan="7" class="text-center text-muted py-4">
                            검색 결과가 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
            <span class="text-muted small"
                  th:text="${users.meta.page + 1} + ' / ' + ${users.meta.totalPages} + ' 페이지'"></span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${users.meta.page == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/users(page=${users.meta.page - 1}, query=${query})}">이전</a>
                    </li>
                    <li class="page-item"
                        th:classappend="${users.meta.page + 1 >= users.meta.totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/admin/users(page=${users.meta.page + 1}, query=${query})}">다음</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
function confirmDeactivate(btn) {
    const userId = btn.dataset.userId;
    const userName = btn.dataset.userName;
    if (!confirm(`'${userName}' 회원을 비활성화하시겠습니까?`)) return;

    fetch(`/admin/api/users/${userId}/deactivate`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('비활성화 완료');
            location.reload();
        } else {
            alert('처리 실패: ' + (data.error?.message ?? '알 수 없는 오류'));
        }
    })
    .catch(() => alert('서버 오류가 발생했습니다.'));
}
</script>
</body>
</html>
